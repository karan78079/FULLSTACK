<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Drag Drop Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Kanban Board</h1>

  <div class="board">
    <div class="column" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>To Do</h2>
      <div class="card" draggable="true" ondragstart="drag(event)" id="task1">
        Design UI
      </div>
      <div class="card" draggable="true" ondragstart="drag(event)" id="task2">
        Create Login Page
      </div>
    </div>

    <div class="column" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>In Progress</h2>
      <div class="card" draggable="true" ondragstart="drag(event)" id="task3">
        Build Backend API
      </div>
    </div>

    <div class="column" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Done</h2>
      <div class="card" draggable="true" ondragstart="drag(event)" id="task4">
        Project Setup
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
