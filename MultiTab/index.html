<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="dashboard">
    <h1>Dashboard</h1>

    <div class="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="details">Details</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <div class="content active" id="overview">
      <h2>Overview</h2>
      <p>This section shows summary cards, recent activity, and dashboard insights.</p>
    </div>

    <div class="content" id="details">
      <h2>Details</h2>
      <p>This section contains detailed reports, analytics, and documentation-style content.</p>
    </div>

    <div class="content" id="settings">
      <h2>Settings</h2>
      <p>This section allows users to manage preferences, account settings, and configurations.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
